<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apuestas registradas · Quiniela Mundial 2026</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="ball">⚽</span> Quiniela Final 2026</div>
    <nav class="tabs">
      <a href="index.html">Apostar</a>
      <a href="apuestas.html">Apuestas</a>
      <a href="resultados.html">Resultados</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <h2>Apuestas registradas</h2>
    <p class="sub">Lista completa y transparente de quién apostó qué.</p>
    <div id="contenedorTabla">
      <div class="empty-state"><span class="ball">⚽</span>Cargando apuestas...</div>
    </div>
  </div>
  <footer>Quiniela de amigos · Final Mundial 2026</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/main.js"></script>
<script>
let configCache = { equipoA: 'Equipo A', equipoB: 'Equipo B' };

listenConfig((config) => { configCache = config; });

function etiquetaPrediccion(p) {
  if (p === 'A') return configCache.equipoA;
  if (p === 'B') return configCache.equipoB;
  return 'Empate';
}

// Oculta un dato sensible dejando visibles solo los últimos N caracteres
// Ej: enmascarar("V-12345678", 3) -> "*******678"
function enmascarar(valor, visibles) {
  if (!valor) return '—';
  const str = String(valor);
  if (str.length <= visibles) return str;
  const ocultos = str.length - visibles;
  return '*'.repeat(ocultos) + str.slice(-visibles);
}

listenApuestas((apuestas) => {
  const cont = document.getElementById('contenedorTabla');

  if (apuestas.length === 0) {
    cont.innerHTML = '<div class="empty-state"><span class="ball">⚽</span>Todavía no hay apuestas registradas.</div>';
    return;
  }

  let filas = apuestas.map((a) => `
    <tr>
      <td>${escapeHtml(a.nombre)}</td>
      <td>${escapeHtml(enmascarar(a.cedula, 3))}</td>
      <td>${escapeHtml(enmascarar(a.telefono, 4))}</td>
      <td>${formatMoney(a.monto)}</td>
      <td><span class="pill">${escapeHtml(etiquetaPrediccion(a.prediccion))}</span></td>
      <td><span class="pill ${a.estado === 'verificada' ? 'pill-ok' : 'pill-pending'}">${a.estado === 'verificada' ? 'Verificada' : 'Pendiente'}</span></td>
    </tr>
  `).join('');

  cont.innerHTML = `
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Aportó</th><th>Predicción</th><th>Estado</th></tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  `;
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
